
name: Main Branch Checks & Builds

on:
  push:
    branches:
      - main

jobs:
  # 调用可复用 Flutter CI 工作流，执行核心测试和分析
  call-flutter-ci:
    uses: ./.github/workflows/reusable_flutter_ci.yml
    with:
      flutter_channel: stable
      flutter_version: latest
      cache_key_suffix: main
    secrets:
      FLUTTER_BUILD_KEY: ${{ secrets.FLUTTER_BUILD_KEY }}

  # 安全扫描
  security_scans:
    needs: call-flutter-ci # 依赖 CI 检查通过
    runs-on: ubuntu-latest
    permissions:
      security-events: write # 允许上传 SARIF 结果
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.1.7
        with:
          fetch-depth: 0

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy Dependency Scan
        uses: aquasecurity/trivy-action@0.22.0
        with:
          scan-type: fs
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy Scan Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3.25.10
        with:
          sarif_file: trivy-results.sarif

      - name: OSV Scanner
        uses: ossf/osv-scanner-action@v1.8.0
        with:
          scan-path: .
          format: sarif
          output: osv-results.sarif

      - name: Upload OSV Scan Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3.25.10
        with:
          sarif_file: osv-results.sarif

      - name: Semgrep SAST
        uses: returntocorp/semgrep-action@v2.19.0
        with:
          publishToken: ${{ secrets.SEMGREP_APP_TOKEN }}
          publishDeployment: ${{ secrets.SEMGREP_DEPLOYMENT_ID }}
          generateSarif: true

      - name: Upload Semgrep SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3.25.10
        with:
          sarif_file: semgrep.sarif

  # CodeQL 分析
  codeql_analysis:
    needs: call-flutter-ci
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.1.7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3.25.10
        with:
          languages: dart

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3.25.10

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3.25.10

  # 额外检查
  additional_checks:
    needs: call-flutter-ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.1.7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: latest

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: License Check
        run: |
          echo "TODO: Implement actual license check logic. E.g., using a tool like FOSSA or a custom script."

      - name: TODO/FIXME Check
        run: |
          echo "### TODO/FIXME Check ⚠️" >> $GITHUB_STEP_SUMMARY
          grep -rnE "(TODO|FIXME)" . --exclude-dir={.git,build,.github,coverage} || true
          if grep -rnE "(TODO|FIXME)" . --exclude-dir={.git,build,.github,coverage} > /dev/null; then
            echo "Found TODO/FIXME comments. Please address them before merging." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
        shell: bash
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}

      - name: debugPrint()/print() Check
        run: |
          echo "### debugPrint()/print() Check ⚠️" >> $GITHUB_STEP_SUMMARY
          if grep -rnE "(debugPrint|print)" lib --exclude-dir={.git,build,.github,coverage} | grep -vFf .github/scripts/print_whitelist.txt > /dev/null; then
            echo "Found debugPrint()/print() calls outside whitelist. Please remove or whitelist them." >> $GITHUB_STEP_SUMMARY
            grep -rnE "(debugPrint|print)" lib --exclude-dir={.git,build,.github,coverage} | grep -vFf .github/scripts/print_whitelist.txt >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
        shell: bash
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}

      - name: Large File Check
        run: |
          echo "### Large File Check ⚠️" >> $GITHUB_STEP_SUMMARY
          find . -type f -size +1M -print0 | xargs -0 du -h | sort -rh >> $GITHUB_STEP_SUMMARY || true
          if find . -type f -size +1M > /dev/null; then
            echo "Found large files. Consider using Git LFS or optimizing them." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
        shell: bash
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}

      - name: Git LFS Check
        run: |
          echo "### Git LFS Check ⚠️" >> $GITHUB_STEP_SUMMARY
          if [ -f .gitattributes ]; then
            echo ".gitattributes found. Checking LFS configuration..." >> $GITHUB_STEP_SUMMARY
            git lfs track >> $GITHUB_STEP_SUMMARY || true
          else
            echo ".gitattributes not found. Consider adding it for large files." >> $GITHUB_STEP_SUMMARY
          fi
        shell: bash
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}

      - name: SPDX License Header Check (Optional)
        run: |
          echo "TODO: Implement SPDX license header check if required. E.g., using a custom script to check file headers."

      - name: Markdown Link Check
        uses: gaurav-nelson/github-action-markdown-link-check@v1.0.15
        with:
          use-quiet-mode: yes
          config-file: .github/workflows/markdown_link_check_config.json

  # 构建所有平台产物并上传为 Artifact
  build_artifacts:
    needs: [call-flutter-ci, security_scans, codeql_analysis, additional_checks] # 依赖所有检查通过
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.1.7

      - name: Install Flutter SDK
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: latest
          cache: true
          cache-key: 'flutter-cache-${{ runner.os }}-stable-latest-main-build'

      - name: Restore Pub Cache
        uses: actions/cache@v4.0.2
        with:
          path: |
            ${{ env.FLUTTER_ROOT }}/.pub-cache
            /home/runner/.gradle/caches
          key: ${{ runner.os }}-pub-gradle-${{ hashFiles('**/pubspec.lock') }}-main-build
          restore-keys: |
            ${{ runner.os }}-pub-gradle-

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4.3.3
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Build Android AppBundle
        run: flutter build appbundle --release

      - name: Upload Android AppBundle Artifact
        uses: actions/upload-artifact@v4.3.3
        with:
          name: android-appbundle
          path: build/app/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Build Linux
        run: flutter build linux --release

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4.3.3
        with:
          name: linux-build
          path: build/linux/x64/release/bundle
          retention-days: 30

      - name: Build Web
        run: flutter build web --release

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4.3.3
        with:
          name: web-build
          path: build/web
          retention-days: 30

  # 清理旧的构建产物
  cleanup_old_artifacts:
    needs: build_artifacts # 在构建完成后运行
    runs-on: ubuntu-latest
    permissions:
      actions: write # 允许删除 workflow runs
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.1.7

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Make cleanup script executable
        run: chmod +x .github/scripts/cleanup_artifacts.sh

      - name: Run Artifact Cleanup Script
        run: ./.github/scripts/cleanup_artifacts.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
