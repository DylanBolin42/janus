name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  # ======================== Format + Analyze (parallel with tests) ========================
  check:
    name: "Format & Analyze"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          channel: stable
          cache-key-suffix: ci-check

      # ---- Format ----
      - name: Dart Format Check
        run: dart format --set-exit-if-changed .

      # ---- Analyze (errors only) ----
      - name: Dart Analyze
        run: |
          flutter analyze --no-fatal-infos --no-fatal-warnings 2>&1 | tee analyze.log
          if grep -q "^  error" analyze.log; then
            echo "::error::Static analysis found errors. Check the log above."
            exit 1
          fi
          echo "### 📊 Static Analysis" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat analyze.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # ======================== Tests + Coverage (parallel with check) ========================
  test:
    name: "Tests & Coverage"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          channel: stable
          cache-key-suffix: ci-test

      # ---- Tests ----
      - name: Run Tests
        run: |
          set -o pipefail
          flutter test --coverage 2>&1 | tee test.log

      # ---- Coverage ----
      - name: Generate Coverage Report
        if: always() && hashFiles('coverage/lcov.info') != ''
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lcov
          genhtml coverage/lcov.info --output-directory coverage/html
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep lines | grep -oP '\d+\.\d+%' | head -1 || echo "N/A")
          echo "### ✅ Test Coverage: $COVERAGE" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Coverage Artifact
        if: always() && hashFiles('coverage/html') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/html
          retention-days: 7

  # ==================== Build test (runs after check & test pass) ==================
  build_android:
    name: "Build Android Check"
    needs: [check, test] # 👈 修正 1：这里必须是 check，对应上面的 check 任务
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 编译稍重，给 15 分钟超时防死锁
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # 根据你的项目需要，可以是 17 或 21
          cache: 'gradle'    # 开启 gradle 缓存，大幅缩短后续构建时间

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter # 👈 修正 2：统一使用你本地的 setup-flutter
        with:
          channel: stable
          cache-key-suffix: ci-build

      - name: Build Debug APK
        run: |
          flutter build apk --debug # 用 debug 构建验证编译，速度极快

  # ======================== PR Summary (waits for all) ========================
  summary:
    name: "PR Summary"
    needs: [check, test, build_android] # 👈 修正 3：让 summary 等待安卓编译任务
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Post PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const checkResult = '${{ needs.check.result }}';
            const testResult  = '${{ needs.test.result }}';
            const buildResult = '${{ needs.build_android.result }}'; // 👈 获取安卓构建状态
            
            // 只有三者全部成功才算通过
            const isAllSuccess = checkResult === 'success' && testResult === 'success' && buildResult === 'success';
            const icon = isAllSuccess ? '✅' : '❌';

            const body = `## ${icon} Flutter CI

            | Check | Result |
            |-------|--------|
            | Format & Analyze | ${checkResult === 'success' ? '✅' : '❌'} |
            | Tests & Coverage | ${testResult === 'success' ? '✅' : '❌'} |
            | Build Android Check | ${buildResult === 'success' ? '✅' : '❌'} |

            [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
