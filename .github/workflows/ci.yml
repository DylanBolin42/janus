name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  flutter-ci:
    name: "Flutter CI"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          channel: stable
          cache-key-suffix: ci

      # ---- Format Check ----
      - name: Dart Format Check
        run: dart format --set-exit-if-changed .

      # ---- Static Analysis (errors only) ----
      - name: Dart Analyze
        run: |
          flutter analyze --no-fatal-infos --no-fatal-warnings 2>&1 | tee analyze.log
          if grep -q "^  error" analyze.log; then
            echo "::error::Static analysis found errors. Check the log above."
            exit 1
          fi
          echo "### 📊 Static Analysis" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat analyze.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # ---- Tests with Coverage ----
      - name: Run Tests
        run: |
          set -o pipefail
          flutter test --coverage 2>&1 | tee test.log

      # ---- Coverage Report ----
      - name: Generate Coverage Report
        if: always()
        run: |
          if [ -f coverage/lcov.info ]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq lcov
            genhtml coverage/lcov.info --output-directory coverage/html
            COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep lines | grep -oP '\d+\.\d+%' | head -1 || echo "N/A")
            echo "### ✅ Test Coverage: $COVERAGE" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ⚠️ No coverage data generated" >> "$GITHUB_STEP_SUMMARY"
          fi

      # ---- Upload Coverage Artifact ----
      - name: Upload Coverage
        if: always() && hashFiles('coverage/html') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/html
          retention-days: 7

      # ---- PR Summary Comment ----
      - name: PR Summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Read step summary
            let summary = '';
            try {
              summary = fs.readFileSync(process.env.GITHUB_STEP_SUMMARY, 'utf8');
            } catch (e) {
              summary = 'CI check completed.';
            }

            // Determine result icon
            const jobStatus = '${{ job.status }}';
            const icon = jobStatus === 'success' ? '✅' : '❌';

            const body = `## ${icon} Flutter CI — ${jobStatus}

            ${summary}

            [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
