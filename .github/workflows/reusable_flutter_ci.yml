
name: Reusable Flutter CI

on: # 定义可复用工作流的输入和秘密
  workflow_call:
    inputs:
      flutter_channel: # Flutter SDK 通道，默认为 stable
        description: 'Flutter channel to use (stable, beta, master)'
        required: false
        default: 'stable'
        type: string
      flutter_version: # Flutter SDK 版本，默认为最新稳定版
        description: 'Flutter SDK version to use (e.g., 3.x.x)'
        required: false
        default: 'latest'
        type: string
      cache_key_suffix: # 缓存键后缀，用于区分不同分支或配置的缓存
        description: 'Suffix for cache keys to bust cache when needed'
        required: false
        default: ''
        type: string
    secrets:
      FLUTTER_BUILD_KEY: # Flutter 构建密钥，用于加密敏感文件
        description: 'Key for Flutter build secrets'
        required: false

jobs:
  flutter_ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository # 检出代码
        uses: actions/checkout@v4

      - name: Install Flutter SDK # 安装 Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ inputs.flutter_channel }}
          cache: true # 启用缓存
          cache-key: 'flutter-cache-${{ runner.os }}-${{ inputs.flutter_channel }}-${{ inputs.flutter_version }}-${{ inputs.cache_key_suffix }}'

      - name: Restore Pub Cache # 恢复 Pub 缓存
        uses: actions/cache@v4
        with:
          path: | # 缓存路径
            /home/runner/.pub-cache
            /home/runner/.gradle/caches
          key: ${{ runner.os }}-pub-gradle-${{ hashFiles('**/pubspec.lock') }}-${{ inputs.cache_key_suffix }}
          restore-keys: | # 恢复键
            ${{ runner.os }}-pub-gradle-

      - name: Get Flutter Dependencies # 获取 Flutter 依赖
        run: flutter pub get

      - name: Check Dart Format # 检查 Dart 代码格式
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze Dart Code # 分析 Dart 代码
        run: flutter analyze

      - name: Run Flutter Tests # 运行 Flutter 测试
        run: |
          set -o pipefail
          flutter test --coverage 2>&1 | tee flutter_test.log

      - name: Generate Coverage Report # 生成覆盖率报告
        run: | # 运行脚本
          sudo apt-get update
          sudo apt-get install -y lcov
          genhtml coverage/lcov.info --output-directory coverage/html

      - name: Upload Coverage Artifact # 上传覆盖率报告作为 Artifact
        uses: actions/upload-artifact@v4.3.3
        with:
          name: coverage-report
          path: coverage/html
          retention-days: 5 # 保留 5 天

      - name: Summarize Test Failures # 总结测试失败原因
        if: failure() # 仅在失败时运行
        run: |
          echo "### Test Failures Summary ❌" >> $GITHUB_STEP_SUMMARY
          grep -E "FAILED|Error:|Expected:|Actual:" flutter_test.log >> $GITHUB_STEP_SUMMARY || echo "No specific failure details found." >> $GITHUB_STEP_SUMMARY
        shell: bash
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}

