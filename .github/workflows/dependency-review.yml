name: Dependency Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-check:
    name: "Dependency Check"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          cache-key-suffix: dep-check

      - name: Check Outdated Dependencies
        run: |
          echo "### 📦 Dependency Status" >> "$GITHUB_STEP_SUMMARY"
          flutter pub outdated --no-transitive 2>&1 | tee outdated.log || true
          if grep -q "No dependencies" outdated.log; then
            echo "✅ All direct dependencies are up to date." >> "$GITHUB_STEP_SUMMARY"
          else
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat outdated.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
