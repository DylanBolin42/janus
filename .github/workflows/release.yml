
name: Release Workflow

on:
  push:
    tags:
      - v* # 匹配所有以 v 开头的标签，例如 v1.0.0

jobs:
  build_release_artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Flutter SDK
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: latest
          cache: true
          cache-key: 'flutter-cache-${{ runner.os }}-stable-latest-release'

      - name: Restore Pub Cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.FLUTTER_ROOT }}/.pub-cache
            /home/runner/.gradle/caches
          key: ${{ runner.os }}-pub-gradle-${{ hashFiles('**/pubspec.lock') }}-release
          restore-keys: |
            ${{ runner.os }}-pub-gradle-

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Build Linux Release
        run: flutter build linux --release

      - name: Build Web
        run: flutter build web --release

      - name: Calculate SHA256 Checksums # 计算 SHA256
        run: |
          find build/app/outputs -type f -exec sha256sum {} + > SHA256SUMS.txt
          find build/linux/x64/release/bundle -type f -exec sha256sum {} + >> SHA256SUMS.txt
          find build/web -type f -exec sha256sum {} + >> SHA256SUMS.txt

      - name: Upload All Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            build/app/outputs/**/*.apk
            build/app/outputs/**/*.aab
            build/linux/x64/release/bundle/**
            build/web
            SHA256SUMS.txt
          retention-days: 90

  create_github_release:
    needs: build_release_artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许写入 Release
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download All Release Artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts

      - name: Generate Release Notes # 生成 Release Notes
        id: release_notes
        uses: release-drafter/release-drafter@v5.25.0
        with:
          config-name: release-drafter.yml
          publish: false # 不自动发布，仅生成草稿
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release # 创建 GitHub Release
        uses: softprops/action-gh-release@v2.0.8
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.body }}
          draft: true # 创建草稿 Release
          prerelease: false
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

