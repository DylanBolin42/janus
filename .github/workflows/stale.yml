name: Stale Issues & PRs

on:
  schedule:
    - cron: "0 0 1 * *"  # 1st of every month
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: "Close Stale Issues & PRs"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Stale Bot
        uses: actions/stale@v9
        with:
          days-before-issue-stale: 90
          days-before-issue-close: 30
          days-before-pr-stale: 60
          days-before-pr-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          stale-issue-message: |
            👋 This issue has been marked as stale due to 90 days of inactivity.
            It will be closed in 30 days if no further activity occurs.
            Feel free to comment to keep it open. Thank you!
          stale-pr-message: |
            👋 This PR has been marked as stale due to 60 days of inactivity.
            It will be closed in 14 days if no further activity occurs.
            Feel free to push new commits or comment to keep it open. Thank you!
          close-issue-message: |
            🔒 This issue has been automatically closed due to inactivity.
            Please reopen if this is still relevant.
          close-pr-message: |
            🔒 This PR has been automatically closed due to inactivity.
            Please reopen if you would like to continue working on it.
          exempt-issue-labels: "pinned,security,bug"
          exempt-pr-labels: "pinned,security,in-progress"
