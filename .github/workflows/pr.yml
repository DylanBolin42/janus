name: Pull Request Checks

on:
  pull_request:
    branches:
      - main

jobs:
  call-flutter-ci:
    uses: ./.github/workflows/reusable_flutter_ci.yml # 调用可复用 Flutter CI 工作流
    with:
      flutter_channel: stable
      flutter_version: latest
      cache_key_suffix: pr
    secrets:
      FLUTTER_BUILD_KEY: ${{ secrets.FLUTTER_BUILD_KEY }}

  security_scans:
    needs: call-flutter-ci
    runs-on: ubuntu-latest
    permissions:
      security-events: write # 允许上传 SARIF 结果
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.1.7
        with:
          fetch-depth: 0 # Gitleaks 需要完整 Git 历史以扫描所有提交

      - name: Gitleaks Secret Scan # Gitleaks 敏感信息扫描
        uses: gitleaks/gitleaks-action@v2.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy Dependency Scan # Trivy 依赖项漏洞扫描
        uses: aquasecurity/trivy-action@0.22.0
        with:
          scan-type: fs
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy Scan Results to GitHub Security # 上传 Trivy 扫描结果
        uses: github/codeql-action/upload-sarif@v3.25.10
        with:
          sarif_file: trivy-results.sarif

      - name: OSV Scanner # OSV 漏洞扫描
        uses: ossf/osv-scanner-action@v1.8.0
        with:
          scan-path: .
          format: sarif
          output: osv-results.sarif

      - name: Upload OSV Scan Results to GitHub Security # 上传 OSV 扫描结果
        uses: github/codeql-action/upload-sarif@v3.25.10
        with:
          sarif_file: osv-results.sarif

      - name: Semgrep SAST # Semgrep 静态应用安全测试
        uses: returntocorp/semgrep-action@v2.19.0
        with:
          publishToken: ${{ secrets.SEMGREP_APP_TOKEN }} # 可选，用于 Semgrep App
          publishDeployment: ${{ secrets.SEMGREP_DEPLOYMENT_ID }} # 可选
          generateSarif: true

      - name: Upload Semgrep SARIF to GitHub Security # 上传 Semgrep 扫描结果
        uses: github/codeql-action/upload-sarif@v3.25.10
        with:
          sarif_file: semgrep.sarif

  codeql_analysis:
    needs: call-flutter-ci
    runs-on: ubuntu-latest
    permissions:
      security-events: write # 允许写入安全事件
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.1.7

      - name: Initialize CodeQL # 初始化 CodeQL
        uses: github/codeql-action/init@v3.25.10
        with:
          languages: dart # 指定 Dart 语言

      - name: Autobuild # 自动构建 (对于 Dart 项目通常不需要，但保留以防万一)
        uses: github/codeql-action/autobuild@v3.25.10

      - name: Perform CodeQL Analysis # 执行 CodeQL 分析
        uses: github/codeql-action/analyze@v3.25.10

  additional_checks:
    needs: call-flutter-ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.1.7

      - name: Set up Flutter # 设置 Flutter 环境
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: latest

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: License Check # 许可证检查
        # 假设项目根目录有 LICENSE 文件，并检查所有依赖的许可证兼容性
        # 这是一个示例，可能需要根据实际许可证要求调整
        run: | # 运行脚本
          echo "TODO: Implement actual license check logic. E.g., using a tool like FOSSA or a custom script."
          # Example: flutter pub run license_checker

      - name: TODO/FIXME Check # TODO/FIXME 检查
        run: | # 运行脚本
          echo "### TODO/FIXME Check ⚠️" >> $GITHUB_STEP_SUMMARY
          grep -rnE "(TODO|FIXME)" . --exclude-dir={.git,build,.github,coverage} || true
          if grep -rnE "(TODO|FIXME)" . --exclude-dir={.git,build,.github,coverage} > /dev/null; then
            echo "Found TODO/FIXME comments. Please address them before merging." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
        shell: bash
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}

      - name: debugPrint()/print() Check # debugPrint()/print() 检查
        run: | # 运行脚本
          echo "### debugPrint()/print() Check ⚠️" >> $GITHUB_STEP_SUMMARY
          # 允许白名单，例如在 lib/utils/logger.dart 中使用的 print
          # 假设白名单文件为 .github/scripts/print_whitelist.txt
          if grep -rnE "(debugPrint|print)" lib --exclude-dir={.git,build,.github,coverage} | grep -vFf .github/scripts/print_whitelist.txt > /dev/null; then
            echo "Found debugPrint()/print() calls outside whitelist. Please remove or whitelist them." >> $GITHUB_STEP_SUMMARY
            grep -rnE "(debugPrint|print)" lib --exclude-dir={.git,build,.github,coverage} | grep -vFf .github/scripts/print_whitelist.txt >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
        shell: bash
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}

      - name: Large File Check # 大文件检查
        run: | # 运行脚本
          echo "### Large File Check ⚠️" >> $GITHUB_STEP_SUMMARY
          # 查找大于 1MB 的文件
          find . -type f -size +1M -print0 | xargs -0 du -h | sort -rh >> $GITHUB_STEP_SUMMARY || true
          if find . -type f -size +1M > /dev/null; then
            echo "Found large files. Consider using Git LFS or optimizing them." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
        shell: bash
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}

      - name: Git LFS Check # Git LFS 检查
        run: | # 运行脚本
          echo "### Git LFS Check ⚠️" >> $GITHUB_STEP_SUMMARY
          # 检查 .gitattributes 是否配置了 LFS
          if [ -f .gitattributes ]; then
            echo ".gitattributes found. Checking LFS configuration..." >> $GITHUB_STEP_SUMMARY
            git lfs track >> $GITHUB_STEP_SUMMARY || true
          else
            echo ".gitattributes not found. Consider adding it for large files." >> $GITHUB_STEP_SUMMARY
          fi
        shell: bash
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}

      - name: SPDX License Header Check (Optional) # SPDX 许可证头部检查
        run: | # 运行脚本
          echo "TODO: Implement SPDX license header check if required. E.g., using a custom script to check file headers."

      - name: Markdown Link Check # Markdown 链接检查
        uses: gaurav-nelson/github-action-markdown-link-check@v1.0.15
        with:
          use-quiet-mode: yes
          config-file: .github/workflows/markdown_link_check_config.json # 配置文件


