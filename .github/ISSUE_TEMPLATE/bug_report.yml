name: "🐛 Bug Report"
description: "Report a bug to help us improve"
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: "Describe the Bug"
      description: "A clear and concise description of what the bug is."
      placeholder: "When I click on X, Y happens instead of Z..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "Steps to reproduce the behavior."
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      description: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: "Screenshots"
      description: "If applicable, add screenshots to help explain the problem."

  - type: dropdown
    id: platform
    attributes:
      label: "Platform"
      multiple: true
      options:
        - Android
        - iOS
        - Linux
        - Windows
        - macOS
        - Web
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: "App Version"
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: textarea
    id: flutter-info
    attributes:
      label: "Flutter Doctor Output"
      description: "Run `flutter doctor -v` and paste the output here."
      render: shell
    validations:
      required: true
