name: "✨ Feature Request"
description: "Suggest a new feature or enhancement"
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please describe it clearly.

  - type: textarea
    id: problem
    attributes:
      label: "Related Problem"
      description: "Is your feature request related to a problem? Describe it."
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "Proposed Solution"
      description: "Describe the solution you'd like."
      placeholder: "I would like to see..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered"
      description: "Describe any alternative solutions or features you've considered."

  - type: dropdown
    id: scope
    attributes:
      label: "Scope"
      options:
        - "App (core logic)"
        - "UI / Design"
        - "Platform-specific"
        - "CI / DevOps"
        - "Documentation"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: "Additional Context"
      description: "Add any other context, screenshots, or references about the feature request here."
